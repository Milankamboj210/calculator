<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Scientific Calculator</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="calculator">

        <div class="top-bar">

            <h2>MK Calculator</h2>

            <div class="top-icons">

                <button id="scientificBtn">
                    🧠
                </button>

                <button id="themeBtn">
                    🌙
                </button>

                <button id="historyBtn">
                    🕒
                </button>

                <button id="copyBtn">
                    📋
                </button>

            </div>

        </div>



        <input
            type="text"
            id="display"
            class="display"
            placeholder="0"
            readonly>



        <div class="history-panel">

            <h3>History</h3>

            <ul id="historyList"></ul>

            <button id="clearHistory">
                Clear History
            </button>

        </div>



        <div class="scientific">

            <button class="sci">sin</button>
            <button class="sci">cos</button>
            <button class="sci">tan</button>
            <button class="sci">√</button>

            <button class="sci">log</button>
            <button class="sci">ln</button>
            <button class="sci">π</button>
            <button class="sci">e</button>

            <button class="sci">x²</button>
            <button class="sci">xʸ</button>
            <button class="sci">!</button>
            <button class="sci">%</button>

        </div>

     

        <div class="buttons">

            <button class="operator">AC</button>
            <button class="operator">(</button>
            <button class="operator">)</button>
            <button class="operator">÷</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">×</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">−</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="operator">⌫</button>
            <button class="equal">=</button>

        </div>

    </div>

    <audio id="clickSound">
        <source src="click.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
